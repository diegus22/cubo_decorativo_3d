<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Llaveros 3D — Diego García</title>
<style>
:root { --bg:#0b0e13; --panel:#161a20; --border:#1f2630; --fg:#e6edf3; --muted:#8b949e; --accent:#7c4dff; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,Inter,sans-serif;overflow:hidden}
.app{display:grid;grid-template-columns:320px 1fr;height:100vh}
aside{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:24px}
aside h1{font-size:18px;font-weight:600;margin-bottom:6px;letter-spacing:-0.02em}
aside .sub{color:var(--muted);font-size:12px;margin-bottom:24px}
.field{margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font:600 16px Inter,sans-serif;outline:none}
input[type=text]:focus{border-color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent)}
.value{display:flex;justify-content:space-between;align-items:center;color:var(--fg);font-size:12px;margin-top:4px}
button{background:var(--accent);color:white;border:none;border-radius:8px;padding:12px 16px;cursor:pointer;font:600 14px Inter,sans-serif;width:100%;transition:transform 0.1s}
button:hover{transform:translateY(-1px)}
button.secondary{background:var(--bg);border:1px solid var(--border);color:var(--fg)}
button.secondary:hover{border-color:var(--accent)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
main{position:relative}
canvas{display:block;width:100%;height:100%}
.info{position:absolute;top:16px;right:16px;background:rgba(22,26,32,0.9);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);backdrop-filter:blur(4px)}
.info b{color:var(--fg)}
.preset{display:inline-block;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:4px 10px;border-radius:14px;margin-right:4px;margin-bottom:4px;cursor:pointer;font-size:12px}
.preset:hover{border-color:var(--accent)}
footer{margin-top:auto;padding-top:18px;border-top:1px solid var(--border);color:var(--muted);font-size:11px}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>🔑 Llaveros 3D</h1>
    <div class="sub">Genera tu llavero personalizado y descarga el STL para imprimir</div>

    <div class="field">
      <label>Texto</label>
      <input type="text" id="text" value="LORETO" maxlength="12" autocomplete="off">
      <div style="margin-top:8px">
        <span class="preset" onclick="setText('LORETO')">LORETO</span>
        <span class="preset" onclick="setText('DIEGO')">DIEGO</span>
        <span class="preset" onclick="setText('AVIOT')">AVIOT</span>
        <span class="preset" onclick="setText('MAMÁ')">MAMÁ</span>
        <span class="preset" onclick="setText('PAPÁ')">PAPÁ</span>
      </div>
      <div id="accentWarn" style="display:none;color:#ffb300;font-size:11px;margin-top:6px;padding:6px 10px;background:rgba(255,179,0,0.1);border-radius:6px;border-left:3px solid #ffb300"></div>
      <div style="display:none">
      </div>
    </div>

    <div class="field">
      <label>Tamaño letra: <span id="sizeVal">22</span> mm</label>
      <input type="range" id="size" min="10" max="40" value="22">
    </div>

    <div class="field">
      <label>Profundidad letra: <span id="depthVal">5</span> mm</label>
      <input type="range" id="depth" min="2" max="15" value="5">
    </div>

    <div class="field">
      <label>Espesor placa: <span id="plateVal">3</span> mm</label>
      <input type="range" id="plate" min="2" max="8" value="3">
    </div>

    <div class="field">
      <label>Diámetro aro: <span id="ringVal">6</span> mm</label>
      <input type="range" id="ring" min="3" max="12" value="6">
    </div>

    <div class="field">
      <label>Resolución (curvas)</label>
      <select id="curveseg" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:8px">
        <option value="6">Baja (rápido)</option>
        <option value="12" selected>Media (recomendado)</option>
        <option value="20">Alta (lento)</option>
      </select>
    </div>

    <button onclick="downloadSTL()">⬇️ Descargar STL</button>
    <div class="row">
      <button class="secondary" onclick="resetView()">↻ Vista</button>
      <button class="secondary" onclick="window.open('https://github.com/diegus22/llaveros3d','_blank')">📦 Repo</button>
    </div>

    <footer>
      Cuerpo único manifold (un solo cuerpo, sin huecos parásitos).<br>
      Imprimir en PLA/PETG, 0.16 mm, 20% relleno, sin soportes (cara plana abajo).<br>
      <br>by <a href="https://diegus22.github.io" target="_blank">Diego García</a> · Ingeniatic
    </footer>
  </aside>
  <main>
    <canvas id="c"></canvas>
    <div class="info">
      <b id="dims">--</b> · <span id="tri">-- triángulos</span>
    </div>
  </main>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';


let scene, camera, renderer, controls, font, currentMesh;
window.addEventListener('error', e => {
  document.querySelector('.info').innerHTML = '⚠️ Error: ' + (e.message || e.error?.message || 'desconocido');
  document.querySelector('.info').style.background = '#ff525244';
  console.error(e);
});
window.addEventListener('unhandledrejection', e => {
  document.querySelector('.info').innerHTML = '⚠️ Promise rejected: ' + (e.reason?.message || e.reason);
  console.error(e);
});
const canvas = document.getElementById('c');

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x11161d);
  camera = new THREE.PerspectiveCamera(45, 1, 1, 2000);
  camera.position.set(60, 60, 80);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(40, 60, 40);
  scene.add(dir);
  const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
  dir2.position.set(-40, -10, -40);
  scene.add(dir2);
  scene.add(new THREE.GridHelper(200, 20, 0x222932, 0x1a1f27));

  resize();
  window.addEventListener('resize', resize);
  animate();

  // Load font (Liberation Sans Bold equivalent on three.js)
  new FontLoader().load(
    'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
    f => { font = f; rebuild(); }
  );
}

function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function buildKeychain() {
  if (!font) return null;
  let rawText = document.getElementById('text').value.trim() || 'TEXTO';
  // Strip diacritics (accents stay as separate floating dots in 3D, breaks manifold)
  // and normalize Ñ → N (helvetiker font doesn't include extended glyphs)
  const text = rawText.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/Ñ/g,'N').replace(/ñ/g,'n');
  if (text !== rawText) {
    document.getElementById('accentWarn').textContent = '↻ Acentos/Ñ removidos para impresión: "' + text + '"';
    document.getElementById('accentWarn').style.display = 'block';
  } else {
    document.getElementById('accentWarn').style.display = 'none';
  }
  const size = +document.getElementById('size').value;
  const depth = +document.getElementById('depth').value;
  const plateDepth = +document.getElementById('plate').value;
  const ringDiam = +document.getElementById('ring').value;
  const curveSeg = +document.getElementById('curveseg').value;

  // 1. Build text geometry
  const textGeom = new TextGeometry(text, {
    font: font,
    size: size,
    height: depth,
    curveSegments: curveSeg,
    bevelEnabled: false,
  });
  textGeom.computeBoundingBox();
  const tb = textGeom.boundingBox;
  const tw = tb.max.x - tb.min.x;
  const th = tb.max.y - tb.min.y;

  // 2. Plate dimensions
  const padding = 6;
  const ringOffset = 4;
  const ringSpace = ringDiam + ringOffset + 4;
  const plateW = tw + padding * 2 + ringSpace;
  const plateH = th + padding * 2;
  const plateRadius = 5;

  // 3. Plate as rounded shape
  const shape = new THREE.Shape();
  const r = Math.min(plateRadius, plateH / 2 - 0.1);
  shape.moveTo(r, 0);
  shape.lineTo(plateW - r, 0);
  shape.quadraticCurveTo(plateW, 0, plateW, r);
  shape.lineTo(plateW, plateH - r);
  shape.quadraticCurveTo(plateW, plateH, plateW - r, plateH);
  shape.lineTo(r, plateH);
  shape.quadraticCurveTo(0, plateH, 0, plateH - r);
  shape.lineTo(0, r);
  shape.quadraticCurveTo(0, 0, r, 0);
  // hole for ring
  const hole = new THREE.Path();
  hole.absarc(ringOffset + ringDiam / 2, plateH / 2, ringDiam / 2, 0, Math.PI * 2, false);
  shape.holes.push(hole);

  const plateGeom = new THREE.ExtrudeGeometry(shape, { depth: plateDepth, bevelEnabled: false, curveSegments: curveSeg });

  // 4. Position text on top of plate
  const textOffset = ringSpace + padding - 2;
  textGeom.translate(-tb.min.x + textOffset, -tb.min.y + padding, plateDepth);

  // 5. Merge into single BufferGeometry (union of plate + text — both extruded with z>0,
  //    so already non-overlapping geometrically; STL doesn't require boolean union, just
  //    one mesh containing both surfaces. For printability we mark as one solid by joining.)
  const mergedGeom = mergeGeometries([plateGeom, textGeom]);
  const mat = new THREE.MeshStandardMaterial({ color: 0x7c4dff, roughness: 0.4, metalness: 0.1 });
  const mesh = new THREE.Mesh(mergedGeom, mat);

  // Center on origin (XY) and rest on grid
  const bb = new THREE.Box3().setFromObject(mesh);
  mesh.position.x = -(bb.max.x + bb.min.x) / 2;
  mesh.position.y = -(bb.max.y + bb.min.y) / 2;
  mesh.position.z = 0;

  mesh.userData.dims = { w: plateW, h: plateH, d: plateDepth + depth };
  mesh.userData.text = text;

  return mesh;
}

function mergeGeometries(geoms) {
  // Manually merge BufferGeometries (avoid BufferGeometryUtils dep)
  const positions = [], normals = [];
  for (const g of geoms) {
    const ng = g.toNonIndexed();
    ng.computeVertexNormals();
    const p = ng.attributes.position.array;
    const n = ng.attributes.normal.array;
    for (let i = 0; i < p.length; i++) positions.push(p[i]);
    for (let i = 0; i < n.length; i++) normals.push(n[i]);
  }
  const bg = new THREE.BufferGeometry();
  bg.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  bg.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  return bg;
}

function rebuild() {
  if (currentMesh) scene.remove(currentMesh);
  const m = buildKeychain();
  if (!m) return;
  currentMesh = m;
  scene.add(m);
  const d = m.userData.dims;
  document.getElementById('dims').textContent = `${d.w.toFixed(0)} × ${d.h.toFixed(0)} × ${d.d.toFixed(1)} mm`;
  const tri = m.geometry.attributes.position.count / 3;
  document.getElementById('tri').textContent = `${Math.round(tri).toLocaleString()} triángulos`;
}

window.setText = (t) => {
  document.getElementById('text').value = t;
  rebuild();
};

window.downloadSTL = () => {
  if (!currentMesh) return alert('No hay modelo todavía.');
  const exp = new STLExporter();
  const stl = exp.parse(currentMesh, { binary: true });
  const blob = new Blob([stl], { type: 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `llavero_${currentMesh.userData.text.replace(/[^a-zA-Z0-9]/g, '_')}.stl`;
  a.click();
};

window.resetView = () => {
  camera.position.set(60, 60, 80);
  controls.target.set(0, 0, 0);
  controls.update();
};

// Live update
['text', 'size', 'depth', 'plate', 'ring', 'curveseg'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const v = document.getElementById(id).value;
    const span = document.getElementById(id + 'Val');
    if (span) span.textContent = v;
    rebuild();
  });
});

init();
</script>
</body>
</html>
